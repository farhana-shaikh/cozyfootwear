<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Cozy Footwear</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f4f4;
}

header{
  background:#111;
  color:white;
  padding:20px;
  text-align:center;
}

nav{
  background:#333;
  padding:10px;
  text-align:center;
}

nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
}

nav a:hover{
  color:#ff9800;
}

.container{
  max-width:600px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:5px;
}

button{
  background:#ff9800;
  border:none;
  padding:12px;
  width:100%;
  color:white;
  font-size:16px;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#e68900;
}

.address{
  margin-top:20px;
  padding:15px;
  background:#f9f9f9;
  border-left:4px solid #ff9800;
  border-radius:5px;
  font-size:14px;
  line-height:1.6;
}

footer{
  background:#111;
  color:white;
  text-align:center;
  padding:15px;
  margin-top:40px;
}
</style>
</head>

<body>

<header>
  <h1>Cozy Footwear</h1>
  <p>Contact Us</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="contact.html">Contact</a>
</nav>

<div class="container">

  <h2>Send Us a Message</h2>

  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea rows="5" placeholder="Your Message"></textarea>
    <button type="submit">Send Message</button>
  </form>

  <div class="address">
    <h3>Our Address</h3>
    <p>
      Shop No 8, 9, 10, 11, Ground Floor, Amola Chamber,<br>
      Near Girish Colddrinks Cross Roads,<br>
      Opposite Vimal Showroom, Below Anurag,<br>
      C G Road, Navrangpura,<br>
      Ahmedabad-380009, Gujarat
    </p>
  </div>

</div>

<footer>
  <p>© 2026 Cozy Footwear</p>
</footer>

</body>
</html>
